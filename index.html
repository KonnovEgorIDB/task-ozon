<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>test-ozon</title>
    <script type="module" crossorigin src="/task-ozon/assets/index-CUnAkYj8.js"></script>
    <link rel="stylesheet" crossorigin href="/task-ozon/assets/index-CRFbqBBU.css">
  </head>
  <body class="body">
    <div class="progress">
      <div
        class="progress__view"
        id="progress-1"
      ></div>
      <div class="progress__controls">
        <div class="switch">
          <label class="switch__label">
            <input
              class="switch__input"
              id="input-value"
              type="number"
              min="0"
              max="100"
            />
          </label>
          <p class="switch__title">Value</p>
        </div>
        <div class="switch">
          <label class="switch__toggle">
            <input
              id="switch-animate"
              type="checkbox"
            />
            <span class="switch__slider"></span>
          </label>
          <p class="switch__title">Animate</p>
        </div>
        <div class="switch">
          <label class="switch__toggle">
            <input
              id="switch-hide"
              type="checkbox"
            />
            <span class="switch__slider"></span>
          </label>
          <p class="switch__title">Hide</p>
        </div>
      </div>
    </div>

    <template id="progress-template">
      <div
        class="progress__ring"
        role="progressbar"
        aria-valuenow="0"
        aria-valuemax="100"
        style="--p: 0"
      >
        <div class="progress-bar__circle"></div>
      </div>
    </template>

  </body>
</html>
